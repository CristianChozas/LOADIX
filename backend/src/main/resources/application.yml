spring:
  application:
    name: loadix-backend-api
  profiles:
    default: dev

server:
  port: ${SERVER_PORT:8082}

loadix:
  security:
    allowed-origins: ${ALLOWED_ORIGINS:http://localhost:3000}
  rate-limit:
    public-capacity: ${RATE_LIMIT_PUBLIC_CAPACITY:60}
    public-window: ${RATE_LIMIT_PUBLIC_WINDOW:PT1M}
    auth-capacity: ${RATE_LIMIT_AUTH_CAPACITY:10}
    auth-window: ${RATE_LIMIT_AUTH_WINDOW:PT15M}

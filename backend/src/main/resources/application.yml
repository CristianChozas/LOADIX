spring:
  application:
    name: loadix-backend-api
  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:backend/.env[.properties]
  profiles:
    default: dev
  jpa:
    properties:
      hibernate:
        default_schema: loadix

server:
  port: ${SERVER_PORT:8082}

loadix:
  security:
    allowed-origins: ${ALLOWED_ORIGINS:http://localhost:3000}
    jwt-secret: ${JWT_SECRET:change-me-to-a-long-random-secret-with-at-least-32-characters}
    jwt-expiration: ${JWT_EXPIRATION:PT24H}
    cookie-secure: ${COOKIE_SECURE:false}
  rate-limit:
    public-capacity: ${RATE_LIMIT_PUBLIC_CAPACITY:60}
    public-window: ${RATE_LIMIT_PUBLIC_WINDOW:PT1M}
    auth-capacity: ${RATE_LIMIT_AUTH_CAPACITY:10}
    auth-window: ${RATE_LIMIT_AUTH_WINDOW:PT15M}
  stripe:
    secret-key: ${STRIPE_SECRET_KEY:}
    default-test-payment-method: ${STRIPE_DEFAULT_TEST_PAYMENT_METHOD:pm_card_visa}
    currency: ${STRIPE_CURRENCY:eur}

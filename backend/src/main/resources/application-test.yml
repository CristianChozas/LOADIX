spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5434}/${POSTGRES_DB:loadix}
    username: ${POSTGRES_USER:loadix}
    password: ${POSTGRES_PASSWORD:loadix}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  flyway:
    enabled: true

loadix:
  security:
    cookie-secure: false

logging:
  level:
    root: WARN
    com.loadix: INFO

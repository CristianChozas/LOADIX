spring:
  config:
    activate:
      on-profile: dev
    import: optional:file:.env[.properties]
  data:
    redis:
      url: ${SPRING_DATA_REDIS_URL:${REDIS_URL:redis://${REDIS_HOST:localhost}:${REDIS_PORT:6379}}}
      ssl:
        enabled: ${REDIS_SSL:false}
  flyway:
    enabled: true
    default-schema: loadix
    schemas: loadix
    create-schemas: true

loadix:
  security:
    cookie-secure: false
  rate-limit:
    auth-capacity: 60
    auth-window: PT1M

logging:
  level:
    root: INFO
    com.loadix: DEBUG

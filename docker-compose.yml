services:
  loadix-postgres:
    image: postgres:16-alpine
    container_name: loadix-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-loadix}
      POSTGRES_USER: ${POSTGRES_USER:-loadix}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-loadix}
    ports:
      - "${POSTGRES_PORT:-5434}:5432"
    volumes:
      - loadix-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-loadix} -d ${POSTGRES_DB:-loadix}"]
      interval: 10s
      timeout: 5s
      retries: 10

  loadix-redis:
    image: redis:7-alpine
    container_name: loadix-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  loadix-postgres-data:
